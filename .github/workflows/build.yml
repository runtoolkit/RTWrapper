name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.0
      - name: Validate datapack
        run: python3 scripts/validate_datapack.py
      - name: Build mod, datapack zip, and run server GameTests
        run: gradle build
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/
            **/build/gametest/
