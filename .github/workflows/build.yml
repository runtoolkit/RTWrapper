name: Build

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 9.5.0

      - name: Prepare run directory
        run: |
          mkdir -p run
          echo "eula=true" > run/eula.txt
          printf "online-mode=false\nserver-port=25565\n" > run/server.properties
          
      - name: Validate datapack
        run: python3 scripts/validate_datapack.py
      - name: Build mod, datapack zip, and run server GameTests
        run: gradle build
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports-and-libs
          path: |
            **/build/reports/
            **/build/test-results/
            **/build/gametest/
            **/build/libs/
